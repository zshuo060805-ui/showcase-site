<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全防护典型场景交互速查器</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid var(--secondary-color);
        }
        .header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        .header p {
            color: #7f8c8d;
            font-size: 0.9em;
        }
        .control-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }
        select:focus {
            border-color: var(--secondary-color);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none; /* 默认隐藏，点击后显示 */
            border-left: 5px solid #e74c3c;
        }
        .result-card h2 {
            margin-top: 0;
            color: #e74c3c;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .rule-section {
            margin-top: 15px;
        }
        .rule-title {
            font-weight: bold;
            color: var(--secondary-color);
            background: #e8f4fd;
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .rule-content {
            margin-left: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>执勤场景安全防护速查器</h1>
        <p>交通管理工程专业实训结业设计 | 交互式参数匹配工具</p>
    </div>

    <!-- 交互输入区 -->
    <div class="control-panel">
        <div class="form-group">
            <label for="roadType">第一步：选择道路大类</label>
            <select id="roadType" onchange="updateScenes()">
                <option value="">-- 请选择道路类型 --</option>
                <option value="high">高速公路与城市快速路</option>
                <option value="normal">普通公路与一般城市道路</option>
            </select>
        </div>

        <div class="form-group">
            <label for="sceneType">第二步：选择具体事故场景</label>
            <select id="sceneType" disabled>
                <option value="">-- 请先选择道路大类 --</option>
            </select>
        </div>

        <button onclick="generatePlan()">生成防护方案</button>
    </div>

    <!-- 动态结果展示区 -->
    <div class="result-card" id="resultCard">
        <h2 id="resTitle">防护方案结果</h2>
        <div id="resContent"></div>
    </div>

    <script>
        // 将规范要求结构化为 JSON 数据库
        const database = {
            "high": {
                "h1": {
                    title: "一般路段・边侧车道",
                    rules: [
                        { name: "预警区", text: "沿来车方向由上游向下游布设事故管理、限速、线形诱导标志，放置于同侧道路边缘，限速值阶梯式降低。" },
                        { name: "警戒区", text: "配备车辆闯入报警设备、反光锥筒，起点在道路边缘，配套警示标志；警车斜向停放作为防冲撞掩体。" },
                        { name: "警戒岗", text: "至少 1 名人员在警戒区内面向来车方向值守观察。" }
                    ]
                },
                "h2": {
                    title: "一般路段・中间车道",
                    rules: [
                        { name: "基础设置", text: "预警区、警戒区基础设置规则与边侧车道一致。" },
                        { name: "强制封闭", text: "必须封闭道路中心线或路侧至中间车道的范围，禁止仅封闭中间单车道。" }
                    ]
                },
                "h3": {
                    title: "隧道 / 桥梁路段",
                    rules: [
                        { name: "入口/起点", text: "按一般路段规则设置，防护距离适当延长。" },
                        { name: "中段/出口", text: "预警区起点提前至隧道入口 / 桥梁起点之前。" },
                        { name: "交通管控", text: "可视情采取限制通行或临时中断交通措施。" }
                    ]
                }
            },
            "normal": {
                "n1": {
                    title: "直线路段・右侧车道",
                    rules: [
                        { name: "基础设置", text: "预警区、警戒区基础设置规则同高快速路边侧车道。" },
                        { name: "非机动车道", text: "若事故占用非机动车道、人行道，需增设防护设施隔离非机动车与行人。" }
                    ]
                },
                "n2": {
                    title: "无隔离直线・左侧未跨线",
                    rules: [
                        { name: "预警区", text: "本侧来车方向设预警区，同时对向来车方向布设事故管理、限速标志预警，标志牌置于中央分隔线。" },
                        { name: "警戒区", text: "本侧设警戒区，中央分隔线视情摆放锥筒隔离。" }
                    ]
                },
                "n3": {
                    title: "平面交叉口・入口段",
                    rules: [
                        { name: "预警区", text: "沿来车方向由上游向下游，布设事故管理、禁止驶入标志设预警区，标志牌置于同侧道路边缘。" },
                        { name: "警戒区", text: "警戒区前端横向放置车辆闯入报警设备，配套警示标志；其余同直线路段右侧车道警戒规则。" },
                        { name: "分流措施", text: "上游同步设置信息提示与分流措施。" }
                    ]
                }
            }
        };

        // 级联菜单联动逻辑：选择大类后，更新小类
        function updateScenes() {
            const roadType = document.getElementById("roadType").value;
            const sceneType = document.getElementById("sceneType");
            
            // 清空并重置第二级下拉框
            sceneType.innerHTML = '<option value="">-- 请选择具体事故场景 --</option>';
            
            if (roadType === "") {
                sceneType.disabled = true;
                return;
            }
            
            sceneType.disabled = false;
            const options = database[roadType];
            
            for (let key in options) {
                let newOption = document.createElement("option");
                newOption.value = key;
                newOption.text = options[key].title;
                sceneType.appendChild(newOption);
            }
        }

        // 核心交互：点击按钮生成结果
        function generatePlan() {
            const roadType = document.getElementById("roadType").value;
            const sceneType = document.getElementById("sceneType").value;
            const resultCard = document.getElementById("resultCard");
            const resTitle = document.getElementById("resTitle");
            const resContent = document.getElementById("resContent");

            if (roadType === "" || sceneType === "") {
                alert("产品经理提示：请完整选择道路类型和事故场景！");
                return;
            }

            // 提取数据
            const data = database[roadType][sceneType];
            
            // 渲染视图
            resTitle.innerText = "场景规范：" + data.title;
            let htmlContent = "";
            data.rules.forEach(rule => {
                htmlContent += `
                    <div class="rule-section">
                        <div class="rule-title">🎯 ${rule.name}</div>
                        <div class="rule-content">${rule.text}</div>
                    </div>
                `;
            });

            resContent.innerHTML = htmlContent;
            
            // 显示结果卡片并加入简单的动画效果
            resultCard.style.display = "block";
            resultCard.style.animation = "fadeIn 0.5s";
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
